<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Rubik', system-ui, sans-serif; color: #35354a; }
  h1,h2,h3,h4 { margin: 0; color: #1a1a2e; }
  p { margin: 0; }
  a { color: #2b6df4; text-decoration: none; }
</style>
</helmet>

<div style="min-height:100vh;width:100%;position:relative;overflow:hidden;background:#f4f6f9;display:flex;align-items:center;">
  <!-- halftone dot pattern -->
  <div style="position:absolute;top:0;left:0;width:44%;height:100%;background-image:radial-gradient(#d6dae2 1.6px,transparent 1.6px);background-size:20px 20px;-webkit-mask-image:linear-gradient(120deg,#000 20%,transparent 80%);mask-image:linear-gradient(120deg,#000 20%,transparent 80%);opacity:.9;"></div>
  <div style="position:absolute;top:0;right:0;width:34%;height:60%;background-image:radial-gradient(#d6dae2 1.6px,transparent 1.6px);background-size:20px 20px;-webkit-mask-image:radial-gradient(circle at 80% 20%,#000,transparent 70%);mask-image:radial-gradient(circle at 80% 20%,#000,transparent 70%);opacity:.8;"></div>

  <div style="position:relative;z-index:2;max-width:1280px;margin:0 auto;width:100%;padding:0 60px;display:grid;grid-template-columns:1fr 1.15fr;gap:40px;align-items:center;">

    <!-- LEFT -->
    <div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:60px;">
        <div style="width:28px;height:34px;background:#1a1a2e;border-radius:14px 14px 4px 4px;position:relative;">
          <div style="position:absolute;top:7px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#fff;"></div>
        </div>
        <span style="font-size:30px;font-weight:700;color:#1a1a2e;letter-spacing:-.5px;">Jobzilla</span>
      </div>
      <h3 style="font-size:24px;font-weight:600;color:#1a1a2e;margin-bottom:6px;">Website is under</h3>
      <h1 style="font-size:66px;font-weight:800;color:#2b6df4;letter-spacing:-1px;line-height:1;margin-bottom:22px;">Maintenance</h1>
      <p style="font-size:16px;color:#6b6b82;margin-bottom:34px;">We apologize for any Inconvenience caused. We've almost done.</p>
      <div style="display:flex;gap:14px;">
        <sc-for list="{{ socials }}" as="s" hint-placeholder-count="4">
          <div style="width:46px;height:46px;border-radius:9px;background:#fff;box-shadow:0 10px 24px -14px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#2b6df4;cursor:pointer;" data-icon="{{ s }}"></div>
        </sc-for>
      </div>
    </div>

    <!-- RIGHT ILLUSTRATION -->
    <div style="display:flex;justify-content:center;min-width:0;">
      <svg style="width:100%;height:auto;max-width:720px;" viewBox="0 0 720 560" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- background leaves -->
        <g fill="#e6e9ef">
          <path d="M330 250c-40 10-70 60-60 130 60 6 100-40 100-90 0-30-15-45-40-40z"/>
          <path d="M600 230c40 6 78 54 74 128-58 12-104-30-108-80-2-30 12-50 34-48z"/>
        </g>
        <!-- gears -->
        <g fill="#d3d8e2">
          <path d="M540 220l6-16h14l6 16 15 4 11-11 10 10-8 14 6 15 16 5v14l-16 4-6 15 8 14-10 10-14-9-15 6-4 16h-14l-5-16-15-5-14 9-10-10 9-14-6-15-16-4v-14l16-5 6-15-9-14 10-10 14 8z"/>
          <circle cx="551" cy="256" r="16" fill="#f4f6f9"/>
        </g>
        <g fill="#c3c9d6">
          <path d="M634 196l4-12h11l4 12 11 3 9-8 8 8-6 11 4 11 12 4v11l-12 3-4 11 6 11-8 8-11-6-11 4-4 12h-11l-3-12-11-4-11 6-8-8 6-11-4-11-12-3v-11l12-4 4-11-6-11 8-8 11 6z"/>
          <circle cx="644" cy="224" r="11" fill="#f4f6f9"/>
        </g>

        <!-- browser window -->
        <rect x="330" y="300" width="360" height="300" rx="10" fill="#cddffb"/>
        <rect x="330" y="300" width="360" height="34" rx="10" fill="#2b6df4"/>
        <circle cx="350" cy="317" r="4" fill="#fff" opacity=".8"/>
        <circle cx="365" cy="317" r="4" fill="#fff" opacity=".8"/>
        <circle cx="380" cy="317" r="4" fill="#fff" opacity=".8"/>
        <g stroke="#fff" stroke-width="3"><path d="M670 313h8M670 320h8M670 327h8"/></g>
        <!-- content blocks -->
        <g fill="#fff">
          <rect x="352" y="352" width="52" height="8" rx="4"/>
          <rect x="352" y="368" width="40" height="8" rx="4"/>
          <rect x="352" y="384" width="46" height="8" rx="4"/>
        </g>
        <circle cx="428" cy="372" r="16" fill="#fff"/>
        <circle cx="426" cy="370" r="7" fill="none" stroke="#2b6df4" stroke-width="2.5"/><path d="M431 375l6 6" stroke="#2b6df4" stroke-width="2.5"/>
        <!-- video -->
        <rect x="352" y="410" width="120" height="80" rx="6" fill="#fff"/>
        <path d="M400 435l22 15-22 15z" fill="#2b6df4"/>
        <!-- images -->
        <rect x="490" y="410" width="55" height="55" rx="6" fill="#fff"/><rect x="555" y="410" width="55" height="55" rx="6" fill="#fff"/>
        <g fill="#2b6df4"><circle cx="505" cy="425" r="5"/><path d="M498 458l12-16 10 12 4-5 10 9v-2h-36z"/></g>
        <g fill="#2b6df4"><circle cx="570" cy="425" r="5"/><path d="M563 458l12-16 10 12 4-5 10 9v-2h-36z"/></g>
        <!-- code block -->
        <rect x="352" y="508" width="90" height="60" rx="6" fill="none" stroke="#8fb4f2" stroke-width="2" stroke-dasharray="5 5"/>
        <g stroke="#2b6df4" stroke-width="2.5"><path d="M366 524h20M366 534h30M366 544h16"/></g>
        <!-- paper being painted -->
        <rect x="470" y="500" width="70" height="90" rx="4" fill="#fff"/>
        <!-- text lines right -->
        <g fill="#fff"><rect x="560" y="512" width="70" height="7" rx="3"/><rect x="560" y="526" width="55" height="7" rx="3"/></g>
        <rect x="560" y="546" width="70" height="30" rx="5" fill="none" stroke="#8fb4f2" stroke-width="2" stroke-dasharray="5 5"/>

        <!-- floating search pill + cursor -->
        <rect x="470" y="366" width="180" height="26" rx="13" fill="#fff"/>
        <circle cx="638" cy="379" r="7" fill="none" stroke="#2b6df4" stroke-width="2.5"/><path d="M643 384l5 5" stroke="#2b6df4" stroke-width="2.5"/>
        <path d="M528 390l0 26 7-7 5 9 5-3-5-9 10-1z" fill="#2b6df4"/>
        <!-- hang lines -->
        <path d="M460 340l50 26M560 340l0 26" stroke="#1a1a2e" stroke-width="1.5"/>

        <!-- ground -->
        <rect x="300" y="596" width="410" height="4" rx="2" fill="#c99a6a"/>

        <!-- PERSON top (coder on window) -->
        <g>
          <path d="M470 300c0-6 8-22 30-22s34 16 34 26l-10 4c-4-10-14-16-24-16s-20 6-24 16z" fill="#1a1a2e"/>
          <circle cx="500" cy="266" r="18" fill="#f0c9a8"/>
          <path d="M482 262c0-14 8-22 18-22s18 8 18 20c-6-4-11-6-18-6s-12 2-18 8z" fill="#1a1a2e"/>
          <path d="M486 288c4-8 30-8 34 0l6 40-46 0z" fill="#2b6df4"/>
          <path d="M484 296c-8 4-12 12-10 22l30 0-4-22z" fill="#3a86ff"/>
          <rect x="500" y="248" width="46" height="24" rx="4" fill="#c3c9d6"/>
          <text x="523" y="264" font-size="13" font-family="monospace" fill="#1a1a2e" text-anchor="middle">&lt;/&gt;</text>
          <!-- legs dangling -->
          <path d="M482 326l-4 40 12 0 6-32z" fill="#5a6270"/>
          <path d="M508 326l6 40 12-2-4-38z" fill="#5a6270"/>
          <ellipse cx="482" cy="368" rx="9" ry="5" fill="#1a1a2e"/><ellipse cx="516" cy="366" rx="9" ry="5" fill="#1a1a2e"/>
        </g>

        <!-- PERSON with wrench (bottom left) -->
        <g>
          <path d="M300 470c0-6 8-20 26-20s30 14 30 22l-9 4c-3-9-12-14-21-14s-17 5-20 14z" fill="#1a1a2e"/>
          <circle cx="326" cy="440" r="16" fill="#f0c9a8"/>
          <path d="M310 436c0-12 7-20 16-20s16 8 16 18c-5-4-10-6-16-6s-11 2-16 8z" fill="#1a1a2e"/>
          <path d="M312 460c4-6 26-6 30 0l6 46-42 0z" fill="#3a86ff"/>
          <path d="M348 476l40 30" stroke="#f0c9a8" stroke-width="12" stroke-linecap="round"/>
          <!-- legs -->
          <path d="M310 504l-6 44 12 0 8-36z" fill="#5a6270"/>
          <path d="M336 504l8 44 12-2-6-42z" fill="#5a6270"/>
          <ellipse cx="308" cy="550" rx="10" ry="5" fill="#1a1a2e"/><ellipse cx="344" cy="548" rx="10" ry="5" fill="#1a1a2e"/>
          <!-- wrench -->
          <g fill="#2b6df4"><rect x="384" y="500" width="80" height="16" rx="8" transform="rotate(6 424 508)"/><circle cx="470" cy="520" r="16"/><circle cx="470" cy="520" r="7" fill="#f4f6f9"/></g>
        </g>

        <!-- PERSON painting (bottom mid) -->
        <g>
          <path d="M540 470c0-6 8-20 26-20s30 14 30 22l-9 4c-3-9-12-14-21-14s-17 5-20 14z" fill="#1a1a2e"/>
          <circle cx="566" cy="440" r="16" fill="#f0c9a8"/>
          <path d="M550 436c0-12 7-20 16-20s16 8 16 18c-5-4-10-6-16-6s-11 2-16 8z" fill="#1a1a2e"/>
          <path d="M552 460c4-6 26-6 30 0l6 46-42 0z" fill="#5a6270"/>
          <path d="M548 478l-30 28" stroke="#f0c9a8" stroke-width="12" stroke-linecap="round"/>
          <rect x="506" y="500" width="22" height="12" rx="3" fill="#2b6df4"/><rect x="512" y="494" width="4" height="8" fill="#8a93a3"/>
          <path d="M552 504l-6 44 12 0 8-36z" fill="#3a86ff"/>
          <path d="M578 504l8 44 12-2-6-42z" fill="#3a86ff"/>
          <ellipse cx="550" cy="550" rx="10" ry="5" fill="#1a1a2e"/><ellipse cx="586" cy="548" rx="10" ry="5" fill="#1a1a2e"/>
          <!-- paint bucket -->
          <path d="M556 574h34l-4 20h-26z" fill="#2b6df4"/><rect x="556" y="570" width="34" height="6" rx="3" fill="#1c56c9"/>
        </g>

        <!-- ladder + person right -->
        <g stroke="#c99a6a" stroke-width="6" stroke-linecap="round"><path d="M690 596l16-140M712 600l16-144M694 500h30M698 470h30M702 440h30"/></g>
        <g>
          <circle cx="700" cy="410" r="15" fill="#f0c9a8"/>
          <path d="M685 406c0-11 7-18 15-18s15 7 15 16c-5-3-9-5-15-5s-10 2-15 7z" fill="#1a1a2e"/>
          <path d="M688 428c4-5 24-5 28 0l6 50-40 0z" fill="#3a86ff"/>
          <path d="M714 440l16-40" stroke="#f0c9a8" stroke-width="10" stroke-linecap="round"/>
          <path d="M688 476l-4 46 11 0 7-38z" fill="#5a6270"/>
          <path d="M712 476l6 46 11-2-5-44z" fill="#5a6270"/>
        </g>
      </svg>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return { socials: ["facebook", "x", "linkedin", "pinterest"] };
  }
  componentDidMount() { this.paintIcons(); }
  componentDidUpdate() { this.paintIcons(); }
  paintIcons() {
    const p = {
      facebook: '<path d="M14 9V7c0-1 .3-1.5 1.6-1.5H17V2.5h-2.4C11.7 2.5 11 4.3 11 6.6V9H8.5v3H11v9.5h3V12h2.3l.4-3z"/>',
      x: '<path d="M17.5 3h2.8l-6.1 7 7.2 9.5h-5.6l-4.4-5.8L6.2 19.5H3.4l6.5-7.5L3 3h5.7l4 5.3z"/>',
      linkedin: '<path d="M6.9 8.5H3.7v11.8h3.2zM5.3 3.2A1.9 1.9 0 1 0 5.3 7a1.9 1.9 0 0 0 0-3.8zM20.3 20.3h-3.2v-5.7c0-1.4 0-3.2-1.9-3.2s-2.2 1.5-2.2 3.1v5.8H9.8V8.5h3v1.6h.1c.5-.8 1.5-1.7 3.1-1.7 3.3 0 3.9 2.2 3.9 5z"/>',
      pinterest: '<path d="M12 2C6.5 2 4 5.7 4 9c0 2 .8 3.8 2.4 4.4.3.1.5 0 .5-.3l.2-.9c.1-.3 0-.4-.2-.6-.5-.6-.8-1.3-.8-2.4 0-3 2.3-5.7 5.9-5.7 3.2 0 5 2 5 4.6 0 3.5-1.5 6.4-3.8 6.4-1.3 0-2.2-1-1.9-2.3.4-1.5 1-3 1-4.1 0-1-.5-1.8-1.6-1.8-1.3 0-2.3 1.3-2.3 3.1 0 1.1.4 1.9.4 1.9l-1.5 6.4c-.4 1.9-.1 4.2 0 4.4 0 .1.2.2.3.1.1-.2 1.9-2.3 2.5-4.5l.9-3.6c.5.9 1.8 1.6 3.1 1.6 4.1 0 6.9-3.7 6.9-8.7C20.9 5.3 17.8 2 12 2z"/>',
    };
    document.querySelectorAll('[data-icon]').forEach(el => {
      const k = el.getAttribute('data-icon');
      if (p[k] && !el.dataset.painted) {
        el.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">' + p[k] + '</svg>';
        el.dataset.painted = "1";
      }
    });
  }
}
</script>
</body>
</html>
